<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Services</title>
</head>
<body>
    <div class="box-container">
        <div class="header">
            <img src="ic_burger.svg" alt="button" class="header__logo1--value">
            <img src="Group.svg" alt="logo" class="header__logo2--value">
            <img src="divider.png" alt="divider" class="header__logo3--value">
            <img src="repair.svg" alt="repair_button" class="header__logo4--value">
            <img src="checkstatus.svg" alt="check" class="header__logo5--value">
        </div>
        <div class="main">
            <div class="divider-header"></div>
            <div class="text">
                <div class="text__divider-low--value"></div>
                <div class="text__text1--value">Услуги и сервисы</div>
            </div>
        </div>
    </div>
        <div class="scroll-container">
            <button class="scroll-container__tab--value active">Ремонтируемые устройства</button>
            <button class="scroll-container__tab--value">Дополнительно</button>
            <button class="scroll-container__tab--value">Наши услуги</button>
            <button class="scroll-container__tab--value">Цены</button>
            <button class="scroll-container__tab--value">Отзывы клиентов</button>
            <button class="scroll-container__tab--value">О компании</button>
            <button class="scroll-container__tab--value">Контакты</button>
        </div>
    <div class="text2">
        <p>Мы являемся авторизованным сервисным центром по ремонту техники Dell. Только у нас вы можете отремонтировать свой ноутбук Dell с официальной гарантией производителя.</p>
    </div>
    <div class="arrow">
        <img src="ic_icon.svg" alt="arrow" class="arrow__down_arrow--value">
        <div class="arrow__text3--value">Читать далее</div>
    </div>
    <div>
        <img src="Picture Copy.png" alt="picture" class="footer">
    </div>

</body>
</html>
